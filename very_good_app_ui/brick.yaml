name: very_good_app_ui
description: A Very Good Flutter app UI package created by Very Good Ventures.
repository: >-
  https://github.com/VeryGoodOpenSource/very_good_templates/tree/main/very_good_app_ui
version: 0.2.0
environment:
  mason: ^0.1.0
vars:
  project_name:
    type: string
    description: The package name
    default: my_app_ui
    prompt: What is the project name?
  description:
    type: string
    description: The package description
    default: A Very Good App UI package
    prompt: What is the project description?
  publishable:
    type: boolean
    description: Whether the generated package is intended to be published.
    default: false
    prompt: Will the package be published?
