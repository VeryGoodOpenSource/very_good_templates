name: very_good_flame_game

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_flame_game.yaml
      - "very_good_flame_game/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_flame_game.yaml
      - "very_good_flame_game/**"
    branches:
      - main

jobs:
  brick:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli
          dart pub global activate very_good_cli
          mason get
          mason make very_good_flame_game -c config.json --on-conflict overwrite --platforms android,ios,macos,web,windows -o very_good_flame_game_output

      - name: 📦 Install Dependencies
        run: very_good packages get very_good_flame_game_output

      - name: 🧪 Run Tests
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@feat/report-on-multiple-paths
        with:
          min_coverage: 100
          flutter_version: "3.41.x"
          coverage_excludes: "**/*.gen.dart"
          working_directory: "very_good_flame_game_output"
