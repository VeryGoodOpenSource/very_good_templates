name: very_good_core

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_core.yaml
      - "very_good_core/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_core.yaml
      - "very_good_core/**"
    branches:
      - main

jobs:
  brick:
    defaults:
      run:
        working-directory: very_good_core/

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.11.0"

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli
          dart pub global activate very_good_cli
          mason get
          mason make very_good_core -c config.json --on-conflict overwrite -o very_good_core_output

      - name: 📦 Install Dependencies
        run: very_good packages get --recursive very_good_core_output

      - name: 🧪 Run Tests
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@feat/report-on-multiple-paths
        with:
          min_coverage: 100
          flutter_version: "3.41.x"
          working_directory: "very_good_core/very_good_core_output"
