name: very_good_flutter_plugin

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_flutter_plugin.yaml
      - "very_good_flutter_plugin/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_flutter_plugin.yaml
      - "very_good_flutter_plugin/**"
    branches:
      - main

jobs:
  brick:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - android
          - ios
          - macos
          - linux
          - web
          - windows
          - darwin

    name: brick (${{ matrix.platform }})

    defaults:
      run:
        working-directory: very_good_flutter_plugin/

    runs-on: ubuntu-latest

    env:
      OUTPUT: very_good_flutter_plugin_${{ matrix.platform }}_output

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v7

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          cache: true
          flutter-version: "3.44.x"

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli 0.1.3
          dart pub global activate very_good_cli 1.1.1
          mason get
          mason make very_good_flutter_plugin -c config.json --on-conflict overwrite --platforms ${{ matrix.platform }} -o $OUTPUT

      - name: 📦 Install Dependencies
        run: very_good packages get --recursive $OUTPUT

      - name: ✨ Check Formatting
        run: dart format --set-exit-if-changed $OUTPUT

      - name: 🕵️ Analyze
        run: dart analyze --fatal-infos --fatal-warnings $OUTPUT

      - name: 🧪 Run Tests
        run: |
          cd $OUTPUT
          very_good test -r --coverage --test-randomize-ordering-seed random --exclude-coverage '**/*.g.dart **/*.gen.dart' --collect-coverage-from=all
