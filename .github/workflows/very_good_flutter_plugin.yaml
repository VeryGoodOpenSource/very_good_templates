name: very_good_flutter_plugin

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_flutter_plugin.yaml
      - "very_good_flutter_plugin/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_flutter_plugin.yaml
      - "very_good_flutter_plugin/**"
    branches:
      - main

jobs:
  brick:
    defaults:
      run:
        working-directory: very_good_flutter_plugin/

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.11.0"

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli 0.1.3
          dart pub global activate very_good_cli 1.1.0
          mason get
          mason make very_good_flutter_plugin -c config.json --on-conflict overwrite --platforms android,ios,linux,macos,web,windows -o very_good_flutter_plugin_output

      - name: 🐦 Run Flutter Package
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1.19.2
        with:
          test_recursion: true
          flutter_version: "3.41.x"
          working_directory: "very_good_flutter_plugin_output"
          coverage_excludes: "**/*.gen.dart"
          collect_coverage_from: "all"
