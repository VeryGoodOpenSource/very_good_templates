name: very_good_flutter_package

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_flutter_package.yaml
      - "very_good_flutter_package/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_flutter_package.yaml
      - "very_good_flutter_package/**"
    branches:
      - main

jobs:
  brick:
    defaults:
      run:
        working-directory: very_good_flutter_package/

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.11.0"

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli 0.1.3
          mason get
          mason make very_good_flutter_package -c very_good_flutter_package/config.json --on-conflict overwrite -o very_good_flutter_package_output

      - name: 🐦 Run Flutter Package
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1.19.2
        with:
          min_coverage: 100
          flutter_version: "3.41.x"
          working_directory: "very_good_flutter_package_output"
