name: very_good_dart_cli

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_dart_cli.yaml
      - "very_good_dart_cli/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_dart_cli.yaml
      - "very_good_dart_cli/**"
    branches:
      - main

jobs:
  brick:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli
          dart pub global activate very_good_cli
          mason get
          mason make very_good_dart_cli -c config.json --on-conflict overwrite -o very_good_dart_cli_output

      - name: 📦 Install Dependencies
        run: dart pub get --directory very_good_dart_cli_output

      - name: 🧪 Run Tests
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/dart_package.yml@feat/report-on-multiple-paths
        with:
          dart_sdk: "3.11.0"
          min_coverage: 100
          working_directory: "very_good_dart_cli_output"
