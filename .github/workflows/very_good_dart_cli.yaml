name: very_good_dart_cli

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - .github/workflows/very_good_dart_cli.yaml
      - "very_good_dart_cli/**"
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/very_good_dart_cli.yaml
      - "very_good_dart_cli/**"
    branches:
      - main

jobs:
  brick:
    defaults:
      run:
        working-directory: very_good_dart_cli/

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.11.0"

      - name: 🧱 Mason Make
        run: |
          dart pub global activate mason_cli 0.1.3
          mason get
          mason make very_good_dart_cli -c config.json --on-conflict overwrite -o very_good_dart_cli_output

      - name: 🎯 Run Dart Package
        uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/dart_package.yml@v1.19.2
        with:
          dart_sdk: "3.11.0"
          min_coverage: 100
          run_bloc_lint: false
          working_directory: "very_good_dart_cli_output"
